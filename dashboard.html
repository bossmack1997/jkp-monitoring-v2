<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard • JKP Party Monitoring</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/dashboard.css" />
  <link rel="stylesheet" href="css/monitoring.css" />
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body>
  <div class="toast-container" id="toastContainer"></div>
  <div class="sidebar-overlay" id="sidebarOverlay"></div>

  <div class="app-shell">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <div class="brand-icon">🎉</div>
        <div>
          <h2>JKP</h2>
          <div class="brand-sub">Party Monitor</div>
        </div>
      </div>
      <nav>
        <a href="dashboard.html" class="active">
          <span class="nav-icon"><i class="fa-solid fa-chart-pie"></i></span>
          Dashboard
        </a>
        <a href="bookings.html">
          <span class="nav-icon"><i class="fa-solid fa-calendar-check"></i></span>
          Bookings
        </a>
        <a href="monitoring.html">
          <span class="nav-icon"><i class="fa-solid fa-desktop"></i></span>
          Monitoring
        </a>
        <a href="calendar.html">
          <span class="nav-icon"><i class="fa-regular fa-calendar-days"></i></span>
          Calendar
        </a>
      </nav>
      <button class="logout-btn" id="logoutBtn">
        <i class="fa-solid fa-arrow-right-from-bracket"></i> Logout
      </button>
    </aside>

    <main class="main-content">
      <div class="topbar">
        <div class="topbar-left">
          <button class="menu-toggle" id="menuToggle" aria-label="Menu">
            <i class="fa-solid fa-bars"></i>
          </button>
          <div>
            <h1>Dashboard</h1>
            <div class="topbar-date" id="topbarDate"></div>
          </div>
        </div>
        <div class="topbar-right">
          <button class="action-btn primary" id="dashboardNewBookingBtn" onclick="window.location.href='bookings.html'">
            <i class="fa-solid fa-plus"></i> New Booking
          </button>
          <button class="action-btn secondary" id="exportBtn" onclick="window.exportCsv()">
            <i class="fa-solid fa-download"></i> Export
          </button>
          <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">
            <i class="fa-solid fa-moon"></i> <span>Dark</span>
          </button>
        </div>
      </div>

      <div class="content-area">
        <div id="dashboardContent">
          <div class="spinner-lg"></div>
        </div>
      </div>
    </main>
  </div>

  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("./js/service-worker.js").catch(err => console.log("SW registration failed:", err));
      });
    }
  </script>
  <script type="module">
    import { guardPage, logoutUser } from "./js/auth.js";
    import { showToast } from "./js/utils.js";
    import { loadDashboardStats, exportBookingsToCSV } from "./js/dashboard.js";
    import { loadMonitoring } from "./js/monitoring.js";

    guardPage("dashboard.html").then(() => {
      document.getElementById("topbarDate").textContent =
        new Date().toLocaleDateString("en-US", { weekday: "long", year: "numeric", month: "long", day: "numeric" });

      document.getElementById("menuToggle").addEventListener("click", () => {
        document.getElementById("sidebar").classList.toggle("open");
        document.getElementById("sidebarOverlay").classList.toggle("active");
      });
      document.getElementById("sidebarOverlay").addEventListener("click", () => {
        document.getElementById("sidebar").classList.remove("open");
        document.getElementById("sidebarOverlay").classList.remove("active");
      });

      const themeToggle = document.getElementById("themeToggle");
      const savedTheme = localStorage.getItem("jkp_theme") || "light";

      function applyTheme(theme) {
        if (theme === "dark") {
          document.documentElement.setAttribute("data-theme", "dark");
          themeToggle.innerHTML = '<i class="fa-solid fa-sun"></i><span>Light</span>';
        } else {
          document.documentElement.removeAttribute("data-theme");
          themeToggle.innerHTML = '<i class="fa-solid fa-moon"></i><span>Dark</span>';
        }
      }

      applyTheme(savedTheme);
      themeToggle.addEventListener("click", () => {
        const isDark = document.documentElement.getAttribute("data-theme") === "dark";
        const newTheme = isDark ? "light" : "dark";
        applyTheme(newTheme);
        localStorage.setItem("jkp_theme", newTheme);
      });

      document.getElementById("logoutBtn").addEventListener("click", logoutUser);

      window.refreshDashboard = loadDashboardStats;
      window.refreshMonitoring = loadMonitoring;
      window.exportCsv = exportBookingsToCSV;

      const dashboardContent = document.getElementById("dashboardContent");
      dashboardContent.innerHTML = `
      <div class="stats-grid">
        <div class="stat-card red" onclick="window.location.href='monitoring.html'">
          <span class="stat-icon">📊</span>
          <div class="stat-number" id="totalCount">0</div>
          <div class="stat-label">Total Bookings</div>
        </div>
        <div class="stat-card blue" onclick="window.location.href='monitoring.html'">
          <span class="stat-icon">📅</span>
          <div class="stat-number" id="todayCount">0</div>
          <div class="stat-label">Today's Parties</div>
        </div>
        <div class="stat-card green" onclick="window.location.href='monitoring.html'">
          <span class="stat-icon">🔜</span>
          <div class="stat-number" id="upcomingCount">0</div>
          <div class="stat-label">Upcoming</div>
        </div>
        <div class="stat-card yellow" onclick="window.location.href='monitoring.html'">
          <span class="stat-icon">🎉</span>
          <div class="stat-number" id="ongoingCount">0</div>
          <div class="stat-label">Ongoing</div>
        </div>
        <div class="stat-card gray" onclick="window.location.href='bookings.html'">
          <span class="stat-icon">✅</span>
          <div class="stat-number" id="completedCount">0</div>
          <div class="stat-label">Completed</div>
        </div>
        <div class="stat-card purple" onclick="window.location.href='bookings.html'">
          <span class="stat-icon">❌</span>
          <div class="stat-number" id="cancelledCount">0</div>
          <div class="stat-label">Cancelled</div>
        </div>
      </div>

      <div class="dashboard-panels">
        <div class="panel">
          <div class="panel-header">
            <h3><i class="fa-solid fa-clock-rotate-left" style="color:var(--jkp-red);margin-right:8px;"></i>Recent Bookings</h3>
            <a href="bookings.html" class="panel-action">View All</a>
          </div>
          <div id="recentList"><p class="empty-state">Loading...</p></div>
        </div>

        <div class="panel">
          <div class="panel-header">
            <h3><i class="fa-solid fa-bolt" style="color:var(--jkp-yellow);margin-right:8px;"></i>Quick Actions</h3>
          </div>
          <div style="display:flex;flex-direction:column;gap:12px;">
            <a href="bookings.html" class="action-btn primary" style="text-align:center;justify-content:center;padding:14px;"><i class="fa-solid fa-plus"></i> New Booking</a>
            <a href="monitoring.html" class="action-btn secondary" style="text-align:center;justify-content:center;padding:14px;"><i class="fa-solid fa-desktop"></i> Live Monitoring</a>
            <a href="calendar.html" class="action-btn secondary" style="text-align:center;justify-content:center;padding:14px;"><i class="fa-regular fa-calendar-days"></i> Calendar View</a>
            <button class="action-btn secondary" onclick="window.exportCsv()" style="text-align:center;justify-content:center;padding:14px;"><i class="fa-solid fa-download"></i> Export CSV</button>
          </div>
        </div>
      </div>
    `;

      loadDashboardStats();
    });
  </script>
</body>
</html>
