<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login • JKP Party Monitoring</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/dashboard.css" />
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body>
  <div class="bg-shapes">
    <div class="shape"></div>
    <div class="shape"></div>
    <div class="shape"></div>
    <div class="shape"></div>
    <div class="shape"></div>
  </div>

  <div class="login-wrap">
    <div class="login-card">
      <div class="logo-wrap">
        <svg viewBox="0 0 56 56" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect width="56" height="56" rx="14" fill="#E31837"/>
          <path d="M14 32c0-4 4-8 10-10 3-1 6-1 8-1s5 0 8 1c6 2 10 6 10 10" stroke="#FFC72C" stroke-width="4" stroke-linecap="round"/>
          <circle cx="20" cy="24" r="3" fill="#FFC72C"/>
          <circle cx="36" cy="24" r="3" fill="#FFC72C"/>
        </svg>
      </div>
      <h1>Welcome back!</h1>
      <p class="sub">Sign in to manage JKP party bookings</p>

      <form id="loginForm">
        <label for="email">Email address</label>
        <div class="input-group">
          <input type="email" id="email" required placeholder="admin@jkp.com" autocomplete="email" />
        </div>

        <label for="password">Password</label>
        <div class="input-group">
          <input type="password" id="password" required placeholder="Enter your password" autocomplete="current-password" />
          <button type="button" class="toggle-password" id="togglePassword" aria-label="Toggle password" style="position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:#aaa;font-size:18px;padding:4px;">
            <i class="fa-regular fa-eye"></i>
          </button>
        </div>

        <div class="remember-row">
          <label>
            <input type="checkbox" class="checkbox" id="rememberMe" />
            Remember me
          </label>
          <a href="javascript:void(0);">Forgot password?</a>
        </div>

        <button type="submit" class="btn-primary" id="loginBtn">
          <span class="spinner" id="loginSpinner" style="display:none;width:20px;height:20px;border:2.5px solid rgba(255,255,255,0.3);border-top-color:white;border-radius:50%;animation:spin 0.7s linear infinite;margin-right:8px;vertical-align:middle;"></span>
          <span id="loginBtnText">Sign In</span>
        </button>

        <div class="error-msg" id="errorMsg"></div>
        <div class="success-msg" id="successMsg"></div>
      </form>

      <p style="text-align:center; margin-top:20px; font-size:12px; color:#999;">
        Secure Admin Access
      </p>
    </div>
  </div>

  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./js/service-worker.js').catch(err => console.log('SW registration failed:', err));
      });
    }
  </script>
  <script type="module">
    const form = document.getElementById("loginForm");
    const errorMsg = document.getElementById("errorMsg");
    const successMsg = document.getElementById("successMsg");
    const loginBtn = document.getElementById("loginBtn");
    const loginBtnText = document.getElementById("loginBtnText");
    const loginSpinner = document.getElementById("loginSpinner");
    const togglePassword = document.getElementById("togglePassword");
    const passwordInput = document.getElementById("password");

    let loginUser;
    try {
      const authModule = await import("./js/auth.js");
      loginUser = authModule.loginUser;
    } catch (err) {
      console.error("Failed to load auth module:", err);
      if (errorMsg) {
        errorMsg.textContent = "System error: Failed to load authentication module. Please refresh or contact support.";
        errorMsg.style.display = "block";
      }
    }

    if (togglePassword && passwordInput) {
      togglePassword.addEventListener("click", () => {
        const isPassword = passwordInput.type === "password";
        passwordInput.type = isPassword ? "text" : "password";
        togglePassword.innerHTML = isPassword
          ? '<i class="fa-regular fa-eye-slash"></i>'
          : '<i class="fa-regular fa-eye"></i>';
      });
    }

    if (form && loginUser) {
      form.addEventListener("submit", async (e) => {
        e.preventDefault();
        errorMsg.style.display = "none";
        successMsg.style.display = "none";

        loginBtn.disabled = true;
        loginBtnText.textContent = "Signing in...";
        loginSpinner.style.display = "inline-block";

        const email = document.getElementById("email").value.trim();
        const password = document.getElementById("password").value;

        try {
          const remember = document.getElementById("rememberMe").checked;
          await loginUser(email, password, remember);
          successMsg.textContent = "Login successful! Redirecting...";
          successMsg.style.display = "block";

          setTimeout(() => {
            window.location.href = "dashboard.html";
          }, 600);
        } catch (err) {
          errorMsg.textContent = err.message || "Invalid email or password.";
          errorMsg.style.display = "block";
          loginBtn.disabled = false;
          loginBtnText.textContent = "Sign In";
          loginSpinner.style.display = "none";
        }
      });
    } else if (form) {
      form.addEventListener("submit", (e) => {
        e.preventDefault();
        errorMsg.textContent = "Authentication module failed to load. Please check your internet connection and refresh the page.";
        errorMsg.style.display = "block";
      });
    }
  </script>
</body>
</html>
