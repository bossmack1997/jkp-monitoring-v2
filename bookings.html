<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bookings • JKP Party Monitoring</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/dashboard.css" />
  <link rel="stylesheet" href="css/monitoring.css" />
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <style>
    .form-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 16px;
    }
    @media (max-width: 480px) {
      .form-grid { grid-template-columns: 1fr; }
    }
    .form-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .form-group label {
      font-size: 13px;
      font-weight: 600;
      color: var(--jkp-text);
    }
    .form-group .form-input {
      padding: 12px 16px;
      border: 1.5px solid var(--jkp-gray-mid);
      border-radius: var(--radius-sm);
      font-size: 14px;
      background: var(--jkp-white);
      transition: var(--transition);
      font-family: var(--font-body);
    }
    .form-group .form-input:focus {
      outline: none;
      border-color: var(--jkp-red);
      box-shadow: 0 0 0 4px rgba(227,24,55,0.08);
    }
    [data-theme="dark"] .form-group label { color: var(--jkp-text); }
    [data-theme="dark"] .form-group .form-input { background: var(--jkp-dark-soft); border-color: #3F3F46; color: var(--jkp-text); }
  </style>
</head>
<body>
  <div class="toast-container" id="toastContainer"></div>
  <div class="sidebar-overlay" id="sidebarOverlay"></div>

  <div class="app-shell">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <div class="brand-icon">🎉</div>
        <div>
          <h2>JKP</h2>
          <div class="brand-sub">Party Monitor</div>
        </div>
      </div>
      <nav>
        <a href="dashboard.html">
          <span class="nav-icon"><i class="fa-solid fa-chart-pie"></i></span>
          Dashboard
        </a>
        <a href="bookings.html" class="active">
          <span class="nav-icon"><i class="fa-solid fa-calendar-check"></i></span>
          Bookings
        </a>
        <a href="monitoring.html">
          <span class="nav-icon"><i class="fa-solid fa-desktop"></i></span>
          Monitoring
        </a>
        <a href="calendar.html">
          <span class="nav-icon"><i class="fa-regular fa-calendar-days"></i></span>
          Calendar
        </a>
      </nav>
      <button class="logout-btn" id="logoutBtn">
        <i class="fa-solid fa-arrow-right-from-bracket"></i> Logout
      </button>
    </aside>

    <main class="main-content">
      <div class="topbar">
        <div class="topbar-left">
          <button class="menu-toggle" id="menuToggle" aria-label="Menu">
            <i class="fa-solid fa-bars"></i>
          </button>
          <div>
            <h1>Bookings</h1>
            <div class="topbar-date" id="topbarDate"></div>
          </div>
        </div>
        <div class="topbar-right">
          <button class="action-btn primary" id="newBookingBtn">
            <i class="fa-solid fa-plus"></i> New Booking
          </button>
          <button class="action-btn secondary" id="refreshBtn">
            <i class="fa-solid fa-rotate-right"></i>
          </button>
        </div>
      </div>

      <div class="content-area">
        <div class="toolbar">
          <div class="search-box">
            <span class="search-icon"><i class="fa-solid fa-magnifying-glass"></i></span>
            <input type="text" id="searchInput" placeholder="Search by customer, celebrant, or contact..." />
          </div>
          <select class="filter-select" id="filterStatus">
            <option value="all">All Status</option>
            <option value="upcoming">Upcoming</option>
            <option value="ongoing">Ongoing</option>
            <option value="completed">Completed</option>
            <option value="cancelled">Cancelled</option>
          </select>
          <select class="filter-select" id="filterDate">
            <option value="all">All Dates</option>
            <option value="today">Today</option>
            <option value="this-week">This Week</option>
          </select>
        </div>

        <div class="panel" style="overflow-x:auto;">
          <table class="data-table">
            <thead>
              <tr>
                <th>Booking #</th>
                <th>Customer</th>
                <th>Celebrant</th>
                <th>Contact</th>
                <th>Date / Time</th>
                <th>Theme</th>
                <th>Room</th>
                <th>Status</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="bookingsTableBody">
              <tr><td colspan="9" style="text-align:center;color:#999;padding:40px;">Loading...</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </main>
  </div>

  <div class="overlay" id="bookingModal">
    <div class="modal">
      <div class="modal-header">
        <h3 id="modalTitle">New Booking</h3>
        <button class="modal-close" id="closeModal">&times;</button>
      </div>
      <form id="bookingForm">
        <input type="hidden" id="bookingId" />
        <div class="form-grid">
          <div class="form-group">
            <label>Booking Number</label>
            <input type="text" class="form-input" id="bookingNumber" readonly />
          </div>
          <div class="form-group">
            <label>Customer Name *</label>
            <input type="text" class="form-input" id="customerName" required />
          </div>
          <div class="form-group">
            <label>Celebrant Name *</label>
            <input type="text" class="form-input" id="celebrantName" required />
          </div>
          <div class="form-group">
            <label>Age</label>
            <input type="text" class="form-input" id="age" />
          </div>
          <div class="form-group">
            <label>Contact Number *</label>
            <input type="text" class="form-input" id="contactNumber" required />
          </div>
          <div class="form-group">
            <label>Party Date *</label>
            <input type="date" class="form-input" id="partyDate" required />
          </div>
          <div class="form-group">
            <label>Party Time *</label>
            <input type="time" class="form-input" id="partyTime" required />
          </div>
          <div class="form-group">
            <label>Number of Guests *</label>
            <input type="number" class="form-input" id="guests" required />
          </div>
          <div class="form-group">
            <label>Package</label>
            <input type="text" class="form-input" id="package_" placeholder="e.g. Standard, Super, Deluxe" />
          </div>
          <div class="form-group">
            <label>Theme</label>
            <input type="text" class="form-input" id="theme" placeholder="e.g. Princess, Sports, Space" />
          </div>
          <div class="form-group">
            <label>Party Room *</label>
            <input type="text" class="form-input" id="partyRoom" required />
          </div>
          <div class="form-group">
            <label>Status</label>
            <select class="form-input" id="status">
              <option value="upcoming">Upcoming</option>
              <option value="ongoing">Ongoing</option>
              <option value="completed">Completed</option>
              <option value="cancelled">Cancelled</option>
            </select>
          </div>
          <div class="form-group" style="grid-column: 1 / -1;">
            <label>Remarks</label>
            <input type="text" class="form-input" id="remarks" placeholder="Special requests or notes..." />
          </div>
        </div>
        <div style="display:flex;gap:12px;margin-top:20px;justify-content:flex-end;">
          <button type="button" class="action-btn secondary" id="cancelBtn">Cancel</button>
          <button type="submit" class="action-btn primary">Save Booking</button>
        </div>
        <div class="error-msg" id="errorMsg" style="margin-top:12px;"></div>
      </form>
    </div>
  </div>

  <div class="overlay" id="bookingDetailsModal">
    <div class="modal" style="max-width:700px;max-height:90vh;overflow-y:auto;">
      <div id="bookingDetailsContent"></div>
    </div>
  </div>

  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("./js/service-worker.js").catch(err => console.log("SW registration failed:", err));
      });
    }
  </script>
  <script type="module">
    import { guardPage, logoutUser } from "./js/auth.js";
    import { showToast, todayStr } from "./js/utils.js";
    import {
      loadBookings,
      saveBooking,
      deleteBooking,
      openBookingModal,
      closeBookingModal,
      submitBookingForm,
      handleDeleteBooking,
      renderBookingsTable,
      showBookingDetailsModal
    } from "./js/bookings.js";

    guardPage("bookings.html").then(() => {
      document.getElementById("topbarDate").textContent =
        new Date().toLocaleDateString("en-US", { weekday: "long", year: "numeric", month: "long", day: "numeric" });

      document.getElementById("menuToggle").addEventListener("click", () => {
        document.getElementById("sidebar").classList.toggle("open");
        document.getElementById("sidebarOverlay").classList.toggle("active");
      });
      document.getElementById("sidebarOverlay").addEventListener("click", () => {
        document.getElementById("sidebar").classList.remove("open");
        document.getElementById("sidebarOverlay").classList.remove("active");
      });

      const themeToggle = document.createElement("button");
      themeToggle.className = "theme-toggle";
      themeToggle.id = "themeToggle";
      themeToggle.setAttribute("aria-label", "Toggle theme");
      themeToggle.innerHTML = '<i class="fa-solid fa-moon"></i> <span>Dark</span>';
      document.querySelector(".topbar-right").appendChild(themeToggle);

      const savedTheme = localStorage.getItem("jkp_theme") || "light";

      function applyTheme(theme) {
        if (theme === "dark") {
          document.documentElement.setAttribute("data-theme", "dark");
          themeToggle.innerHTML = '<i class="fa-solid fa-sun"></i><span>Light</span>';
        } else {
          document.documentElement.removeAttribute("data-theme");
          themeToggle.innerHTML = '<i class="fa-solid fa-moon"></i><span>Dark</span>';
        }
      }

      applyTheme(savedTheme);
      themeToggle.addEventListener("click", () => {
        const isDark = document.documentElement.getAttribute("data-theme") === "dark";
        const newTheme = isDark ? "light" : "dark";
        applyTheme(newTheme);
        localStorage.setItem("jkp_theme", newTheme);
      });

      document.getElementById("logoutBtn").addEventListener("click", logoutUser);

      document.getElementById("newBookingBtn").addEventListener("click", () => {
        window.__editBookingData = [];
        openBookingModal();
      });
      document.getElementById("closeModal").addEventListener("click", closeBookingModal);
      document.getElementById("cancelBtn").addEventListener("click", closeBookingModal);
      document.getElementById("bookingForm").addEventListener("submit", (e) => {
        e.preventDefault();
        submitBookingForm();
      });
      document.getElementById("refreshBtn").addEventListener("click", loadAndRender);

      let debounceTimer;
      document.getElementById("searchInput").addEventListener("input", (e) => {
        clearTimeout(debounceTimer);
        debounceTimer = setTimeout(() => loadAndRender({ search: e.target.value }), 300);
      });
      document.getElementById("filterStatus").addEventListener("change", (e) => loadAndRender({ status: e.target.value }));
      document.getElementById("filterDate").addEventListener("change", (e) => loadAndRender({ date: e.target.value }));

      async function loadAndRender(filters = {}) {
        const status = document.getElementById("filterStatus").value;
        const date = document.getElementById("filterDate").value;
        const search = document.getElementById("searchInput").value || "";
        const merged = { ...filters, search, status, date };
        const bookings = await loadBookings(merged);
        window.allBookings = bookings;
        renderBookingsTable(bookings);
      }

      loadAndRender();
    });
  </script>
</body>
</html>
